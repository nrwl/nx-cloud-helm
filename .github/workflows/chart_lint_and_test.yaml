name: Lint and Test Charts

on: pull_request

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.15.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.9'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config testing-files/ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config testing-files/ct.yaml

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Install MongoDB
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm install mongo oci://registry-1.docker.io/bitnamicharts/mongodb \
          --version 16.5.32 \
          --namespace mongodb \
          --create-namespace \
          --values testing-files/mongodb.yaml \
          --wait

      - name: Install Valkey
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm install valkey oci://registry-1.docker.io/bitnamicharts/valkey \
          --version 3.0.22 \
          --namespace valkey \
          --create-namespace \
          --values testing-files/valkey.yaml \
          --wait

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config testing-files/ct.yaml --target-branch ${{ github.event.repository.default_branch }} --debug