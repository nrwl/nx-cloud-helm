{{- if not .Values.roleBindings.controller.existingRoleBinding }}
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.roles.controller.clusterScoped }}
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "nxCloud.app.labels" . | indent 4 }}
  name: nx-cloud-workflow-controller-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nx-cloud-workflow-controller-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccounts.controller.name }}
    namespace: {{ .Values.global.namespace }}
---
# Lease binding stays namespace-scoped (see roles.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "nxCloud.app.labels" . | indent 4 }}
  name: nx-cloud-workflow-controller-lease-rolebinding
  namespace: {{ .Values.global.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nx-cloud-workflow-controller-lease-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccounts.controller.name }}
    namespace: {{ .Values.global.namespace }}
{{- else }}
kind: RoleBinding
metadata:
  labels:
    {{- include "nxCloud.app.labels" . | indent 4 }}
  name: nx-cloud-workflow-controller-rolebinding
  namespace: {{ .Values.global.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nx-cloud-workflow-controller-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccounts.controller.name }}
    namespace: {{ .Values.global.namespace }}
{{- end }}
{{- end }}
{{- if not .Values.roleBindings.runner.existingRoleBinding }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "nxCloud.app.labels" . | indent 4 }}
  name: nx-cloud-workflow-runner-rolebinding
  namespace: {{ .Values.global.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nx-cloud-workflow-runner-role
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.runner.name }}
  namespace: {{ .Values.global.namespace }}
{{- end }}
