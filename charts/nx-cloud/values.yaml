global:
  labels: {}
  podLabels: {}
  imageRegistry: ""
  imageTag: "2025.07.1"
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  verboseLogging: false
  logLevel: "INFO"
  nxCloudAppURL: ""
  mongodbConnectionString:
    secretName: ""
    secretKey: ""
  extraContainers: []

config:
  agentConfigs: ""

ingress:
  enabled: true
  annotations: {}
  labels: {}
  className: ""
  host: ""
  tls:
    enabled: false
    secretName: ""
    hosts: []
  additionalPaths: []

fileServer:
  enabled: false
  verboseLogging: false
  logLevel: "INFO"

  image:
    repository: "nxprivatecloud/nx-cloud-file-server"
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

  service:
    annotations: {}
    labels: {}
    name: nx-cloud-file-server-service
    type: ClusterIP
    port: 5000

  deployment:
    annotations: {}
    labels: {}
    podLabels: {}
    port: 5000
    env:
      # Must be greater than the longest aggregator hash expiration
      # (NX_CLOUD_DB_HASH_DATA_EXPIRATION_IN_DAYS, default 28 days) so that
      # the file server never deletes an artifact while its hash record still
      # exists in Mongo. Set to 29 = 28 + 1 day of safety margin.
      NX_CACHE_EXPIRATION_PERIOD_IN_DAYS: "29"

    envValueFrom: {}
    #  ENV_NAME:
    #    configMapKeyRef:
    #      name: configmap-name
    #      key: value_key

    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0

    envFrom: []

    securityContext: {}
    podSecurityContext: {}

    affinity: {}
    tolerations: []
    nodeSelector: {}

    resources:
      limits: {}
      requests:
        memory: '500Mi'
        cpu: '500m'

    volumes: []
    volumeMounts: []
    extraContainers: []
    initContainers: []

    livenessProbe:
      httpGet:
        path: /file/uptime-check
        port: 5000
      initialDelaySeconds: 10

    startupProbe:
      httpGet:
        path: /file/uptime-check
        port: 5000
      failureThreshold: 10
      periodSeconds: 5

    readinessProbe: {}

  pvc:
    name: nx-cloud-file-server
    annotations: {}
    labels: {}
    storageClassName: ""
    size: 10Gi
    helmResourcePolicy: keep

  serviceAccount:
    create: true
    name: nx-cloud-file-server
    annotations: {}
    labels: {}
    automount: false

aggregator:
  verboseLogging: false
  logLevel: "INFO"

  image:
    repository: "nxprivatecloud/nx-cloud-aggregator"
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

  cronjob:
    schedule: "*/10 * * * *"
    annotations: {}
    labels: {}
    podLabels: {}
    env: {}

    envValueFrom: {}
    #  ENV_NAME:
    #    configMapKeyRef:
    #      name: configmap-name
    #      key: value_key
    envFrom: []

    securityContext: {}
    podSecurityContext: {}

    affinity: {}
    tolerations: []
    nodeSelector: {}

    resources:
      limits: {}
      requests:
        memory: '1200Mi'
        cpu: '500m'

    volumes: []
    volumeMounts: []
    initContainers: []

  serviceAccount:
    create: true
    name: nx-cloud-aggregator
    annotations: {}
    labels: {}
    automount: false

  secret:
    create: false

frontend:
  verboseLogging: false
  logLevel: "INFO"

  image:
    repository: "nxprivatecloud/nx-cloud-frontend"
    tag: ""
    digest: ""
    pullPolicy: ""

  service:
    annotations: {}
    labels: {}
    name: nx-cloud-frontend-service
    type: ClusterIP
    port: 8080

  deployment:
    annotations: {}
    labels: {}
    podLabels: {}
    replicas: 1
    port: 4202
    env: {}

    envValueFrom: {}
    #  ENV_NAME:
    #    configMapKeyRef:
    #      name: configmap-name
    #      key: value_key

    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1

    envFrom: []

    securityContext: {}
    podSecurityContext: {}

    affinity: {}
    tolerations: []
    nodeSelector: {}

    resources:
      limits: {}
      requests:
        memory: '500Mi'
        cpu: '500m'

    volumes: []
    volumeMounts: []
    extraContainers: []
    initContainers: []

    startupProbe: {}

    livenessProbe:
      httpGet:
        path: /healthz
        port: 4202
      initialDelaySeconds: 15
      periodSeconds: 20

    readinessProbe:
      httpGet:
        path: /readyz
        port: 4202
      initialDelaySeconds: 5
      periodSeconds: 10

  serviceAccount:
    create: true
    name: nx-cloud-frontend
    annotations: {}
    labels: {}
    automount: false

  hpa:
    enabled: false
    annotations: {}
    labels: {}
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: ""
    behavior: {}
    customMetrics: []

api:
  verboseLogging: false
  logLevel: "INFO"

  # Valkey (Redis-compatible) configuration for the API.
  valkey:
    clientProvider: "redisson"
    useSentinel: false
    sentinelMasterName: ""
    sentinelPort: 26379
    primaryAddress: ""
    replicaAddresses: ""
    port: 6379
    username: ""
    passwordSecret:
      name: ""
      key: ""

  image:
    repository: "nxprivatecloud/nx-cloud-nx-api"
    tag: ""
    digest: ""
    pullPolicy: ""

  service:
    annotations: {}
    labels: {}
    name: nx-cloud-nx-api-service
    type: ClusterIP
    port: 4203

  deployment:
    annotations: {}
    labels: {}
    podLabels: {}
    replicas: 1
    port: 4203
    env: {}

    envValueFrom: {}
    #  ENV_NAME:
    #    configMapKeyRef:
    #      name: configmap-name
    #      key: value_key

    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1

    envFrom: []

    securityContext: {}
    podSecurityContext: {}

    affinity: {}
    tolerations: []
    nodeSelector: {}

    resources:
      limits: {}
      requests:
        memory: '1000Mi'
        cpu: '1000m'

    volumes: []
    volumeMounts: []
    extraContainers: []
    initContainers: []

    startupProbe:
      httpGet:
        path: /nx-cloud/uptime-check
        port: 4203
      initialDelaySeconds: 10
      failureThreshold: 5
      periodSeconds: 10

    livenessProbe:
      httpGet:
        path: /nx-cloud/uptime-check
        port: 4203
      initialDelaySeconds: 30

    readinessProbe: {}

  serviceAccount:
    create: true
    name: nx-cloud-nx-api
    annotations: {}
    labels: {}
    automount: false

workflowController:
  service:
    enabled: false
    name: "nx-cloud-workflow-controller-service"
    annotations: {}
    labels: {}
    externalName: ""
    port: 9000
    headless: false

extraObjects: {}
