auth:
  password: "password"

image:
  repository: bitnamilegacy/valkey

primary:
  persistence:
    enabled: false

replica:
  replicaCount: 3
  persistence:
    enabled: false

sentinel:
  image:
    repository: bitnamilegacy/valkey-sentinel
  enabled: true
  primarySet: nxcloud
  quorum: 2

commonConfiguration: |-
  # Enable AOF https://valkey.io/docs/topics/persistence.html
  appendonly yes
  notify-keyspace-events Els
  # Disable RDB persistence, AOF persistence already enabled.
  save ""

metrics:
  image:
    repository: bitnamilegacy/redis-exporter
  enabled: true
  extraArgs:
    check-keys: 'backgroundTasks:workingSet,backgroundTasks:workingSet:claims'
    count-keys: 'backgroundTasks:tasks:keyed:work:*'

volumePermissions:
  image:
    repository: bitnamilegacy/os-shell

kubectl:
  image:
    repository: bitnamilegacy/kubectl